<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="COZY" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- App Meta -->
    <title>COZY - Your Soul, Your Scent</title>
    <meta name="description" content="Aplikasi parfum personal pertama di Indonesia dengan AI, psikologi aroma, dan komunitas sosial premium." />
    <meta name="keywords" content="parfum, fragrance, AI, personalisasi, Indonesia, aroma, scent, luxury, premium" />
    <meta name="author" content="COZY Team" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="COZY - Your Soul, Your Scent" />
    <meta property="og:description" content="Temukan parfum yang mencerminkan kepribadian Anda dengan teknologi AI terdepan" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="https://cozy-app.vercel.app" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="COZY" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="COZY - Your Soul, Your Scent" />
    <meta name="twitter:description" content="Aplikasi parfum personal premium dengan AI" />
    <meta name="twitter:image" content="/twitter-image.jpg" />
    
    <!-- App Icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preloads for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.openai.com" />
    <link rel="preconnect" href="https://image.pollinations.ai" />
    
    <!-- Prevent FOUC -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #000000;
        color: #ffffff;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      
      #root {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      
      /* Loading Animation */
      .splash-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .splash-logo {
        width: 120px;
        height: 120px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        animation: pulse 2s ease-in-out infinite;
        margin-bottom: 24px;
      }
      
      .splash-text {
        color: #ffffff;
        font-size: 14px;
        font-weight: 300;
        letter-spacing: 2px;
        opacity: 0.8;
        animation: fadeIn 1s ease-in-out 0.5s both;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
      }
      
      @keyframes fadeIn {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 0.8; transform: translateY(0); }
      }
      
      /* Hide scrollbar but keep functionality */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      
      /* iOS safe area support */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    </style>
  </head>
  <body>
    <!-- Initial Loading -->
    <div id="splash" class="splash-loader">
      <div class="splash-logo">
        <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
          <path d="M30 5C31.6569 5 33 6.34315 33 8V25H50C51.6569 25 53 26.3431 53 28C53 29.6569 51.6569 31 50 31H33V48C33 49.6569 31.6569 51 30 51C28.3431 51 27 49.6569 27 48V31H10C8.34315 31 7 29.6569 7 28C7 26.3431 8.34315 25 10 25H27V8C27 6.34315 28.3431 5 30 5Z" fill="white" fill-opacity="0.9"/>
        </svg>
      </div>
      <div class="splash-text">Your Soul, Your Scent</div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('SW registered'))
            .catch(() => console.log('SW registration failed'));
        });
      }
    </script>
  </body>
</html>
